name: Weekly Report

on:
  schedule:
    - cron: '5 15 * * 2' # 수요일 00:05 KST (리뷰 마감 화 23:59 직후)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # 룰셋(main 보호)을 통과해 push하기 위한 GitHub App 토큰 (App은 룰셋 bypass 목록에 등록됨)
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate report
        id: gen
        run: |
          python3 .github/scripts/weekly_report.py
          echo "range=$(cat range.txt)" >> "$GITHUB_OUTPUT"

      - name: Create weekly issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MENTIONS=$(gh api "repos/$GITHUB_REPOSITORY/collaborators" --jq '.[].login' | sed 's/^/@/' | paste -sd' ' -)
          printf '\n---\ncc %s\n' "$MENTIONS" >> report.md
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "📊 주간 문제풀이 리포트 (${{ steps.gen.outputs.range }})" \
            --body-file report.md

      - name: Update README on main
        run: |
          rm -f report.md range.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README 변경 없음 → 종료"
            exit 0
          fi
          git commit -m "docs: 주간 문제풀이 현황 갱신 (${{ steps.gen.outputs.range }})"
          # 실행 중 main에 다른 커밋(auto-merge 등)이 들어오면 push가 거절되므로 rebase 후 재시도
          for i in 1 2 3; do
            git push origin HEAD:main && exit 0
            echo "push 거절됨 → rebase 후 재시도 ($i/3)"
            git pull --rebase origin main
          done
          exit 1
