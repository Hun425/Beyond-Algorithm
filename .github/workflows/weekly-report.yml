name: Weekly Report

on:
  schedule:
    - cron: '5 15 * * 2' # 수요일 00:05 KST (리뷰 마감 화 23:59 직후)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate report
        id: gen
        run: |
          python3 .github/scripts/weekly_report.py
          echo "range=$(cat range.txt)" >> "$GITHUB_OUTPUT"

      - name: Create weekly issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "📊 주간 문제풀이 리포트 (${{ steps.gen.outputs.range }})" \
            --body-file report.md

      - name: Update README on main
        run: |
          rm -f report.md range.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || { git commit -m "docs: 주간 문제풀이 현황 갱신 (${{ steps.gen.outputs.range }})"; git push; }
