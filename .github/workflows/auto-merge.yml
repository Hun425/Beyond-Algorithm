name: Auto Merge

on:
  pull_request:
    types: [labeled, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge if approved and labeled
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          info=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json state,reviewDecision,labels,isDraft)
          state=$(echo "$info" | jq -r .state)
          decision=$(echo "$info" | jq -r .reviewDecision)
          labels=$(echo "$info" | jq '.labels | length')
          draft=$(echo "$info" | jq -r .isDraft)
          echo "state=$state reviewDecision=$decision labels=$labels draft=$draft"
          if [ "$state" != "OPEN" ]; then
            echo "PR이 열려있지 않음 → 종료"
            exit 0
          fi
          if [ "$decision" = "APPROVED" ] && [ "$labels" -ge 1 ] && [ "$draft" = "false" ]; then
            echo "조건 충족 → merge 실행"
            gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --merge
            echo "head 브랜치 삭제: $HEAD_REF"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$HEAD_REF" || echo "브랜치가 이미 삭제됨"
          else
            echo "조건 미충족 → merge 대기 (approve 3개 + 라벨 1개 이상 필요)"
          fi
